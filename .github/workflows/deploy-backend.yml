name: Deploy Backend to EasyPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger EasyPanel deployment
        run: |
          echo "Triggering EasyPanel backend deployment..."
          response=$(curl -s -w "%{http_code}" -X POST "${{ secrets.EASYPANEL_DEPLOY_BACKEND_WEBHOOK }}")
          http_code="${response: -3}"
          if [ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "204" ]; then
            echo "Deployment webhook triggered successfully (HTTP $http_code)"
            echo "EasyPanel will now:"
            echo "  - Download code from main branch"
            echo "  - Build with Docker (npm install + nest build + prisma generate)"
            echo "  - Run prisma migrate deploy on startup"
            echo "  - Start the application"
          else
            echo "Deployment webhook failed (HTTP $http_code)"
            echo "Response: ${response%???}"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "Deployment Summary:"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ github.sha }}"
          echo "Author:  ${{ github.actor }}"
          echo "Time:    $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Status:  Webhook triggered successfully"
